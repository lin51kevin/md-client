style: github
template: CHANGELOG.tpl.md
info:
  title: CHANGELOG
  repository_url: https://github.com/lin51kevin/md-client
options:
  tag_filter_pattern: '^v'
  sort: date-desc
  header:
    pattern: "^(\\w*)(?:\\(([\\w\\$\\.\\-\\*\\s]*)\\))?\\:\\s(.*)$"
    pattern_maps:
      - Type
      - Scope
      - Subject
  commit_groups:
    group_by: Type
    sort_by: Custom
    title_order:
      - Added
      - Fixed
      - Performance
      - Changed
      - Other
    title_maps:
      feat: Added
      fix: Fixed
      perf: Performance
      refactor: Changed
      chore: Changed
  notes:
    keywords:
      - BREAKING CHANGE
